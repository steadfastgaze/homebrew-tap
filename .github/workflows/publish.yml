name: brew release

on:
  workflow_dispatch:
    inputs:
      formula:
        description: Formula to release
        required: true
        default: moespresso

jobs:
  release:
    runs-on: macos-26
    permissions:
      actions: read
      checks: read
      contents: write
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: macos-26-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: macos-26-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - name: Ensure the Metal toolchain is available
        run: |
          if ! xcrun metal -v; then
            xcodebuild -downloadComponent MetalToolchain
          fi
          xcrun metal -v

      - name: Build and test the bottle
        env:
          FORMULA: ${{ inputs.formula }}
        run: |
          brew test-bot --only-formulae --testing-formulae="$FORMULA"
          compgen -G '*.bottle.json' > /dev/null

      - name: Set up git
        uses: Homebrew/actions/git-user-config@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1

      - name: Publish the bottle
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: brew pr-upload --debug

      - name: Push commits
        uses: Homebrew/actions/git-try-push@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
        with:
          branch: main
